services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-issueboard}
      POSTGRES_USER: ${POSTGRES_USER:-issueboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-issueboard}
    volumes:
      - issueboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-issueboard} -d ${POSTGRES_DB:-issueboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-issueboard}:${POSTGRES_PASSWORD:-issueboard}@postgres:5432/${POSTGRES_DB:-issueboard}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-관리자}
      ACCESS_TOKEN_EXPIRES_MINUTES: ${ACCESS_TOKEN_EXPIRES_MINUTES:-720}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  issueboard_postgres_data:
